version: '3'

vars:
  BINARY_NAME: dns-switch
  INSTALL_PATH: /usr/local/bin

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BINARY_NAME}} ./cmd/dns-switch
    sources:
      - "cmd/**/*.go"
      - "internal/**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY_NAME}}"

  install:
    desc: Install the binary to /usr/local/bin
    deps: [build]
    cmds:
      - sudo cp {{.BINARY_NAME}} {{.INSTALL_PATH}}/{{.BINARY_NAME}}
      - sudo chmod +x {{.INSTALL_PATH}}/{{.BINARY_NAME}}
      - echo "Installed to {{.INSTALL_PATH}}/{{.BINARY_NAME}}"

  run:
    desc: Build and run the application
    deps: [build]
    cmds:
      - sudo ./{{.BINARY_NAME}}

  clean:
    desc: Clean build artifacts
    cmds:
      - go clean
      - rm -f {{.BINARY_NAME}}
      - echo "Cleaned build artifacts"

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run linter (requires golangci-lint)
    cmds:
      - golangci-lint run
    preconditions:
      - sh: command -v golangci-lint
        msg: "golangci-lint is not installed. Install with: brew install golangci-lint"

  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy
      - echo "Dependencies updated"

  uninstall:
    desc: Uninstall the binary
    cmds:
      - sudo rm -f {{.INSTALL_PATH}}/{{.BINARY_NAME}}
      - echo "Uninstalled from {{.INSTALL_PATH}}/{{.BINARY_NAME}}"

  dev:
    desc: Run in development mode (build + run)
    cmds:
      - task: build
      - task: run

  check:
    desc: Run all checks (fmt, vet, test)
    cmds:
      - task: fmt
      - task: vet
      - task: test
      - echo "All checks passed!"

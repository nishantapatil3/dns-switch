name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build for Linux (amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -o dns-switch-linux-amd64 -ldflags "-s -w" ./cmd/dns-switch
          tar czf dns-switch-linux-amd64.tar.gz dns-switch-linux-amd64

      - name: Build for Linux (arm64)
        run: |
          GOOS=linux GOARCH=arm64 go build -o dns-switch-linux-arm64 -ldflags "-s -w" ./cmd/dns-switch
          tar czf dns-switch-linux-arm64.tar.gz dns-switch-linux-arm64

      - name: Build for macOS (amd64)
        run: |
          GOOS=darwin GOARCH=amd64 go build -o dns-switch-darwin-amd64 -ldflags "-s -w" ./cmd/dns-switch
          tar czf dns-switch-darwin-amd64.tar.gz dns-switch-darwin-amd64

      - name: Build for macOS (arm64)
        run: |
          GOOS=darwin GOARCH=arm64 go build -o dns-switch-darwin-arm64 -ldflags "-s -w" ./cmd/dns-switch
          tar czf dns-switch-darwin-arm64.tar.gz dns-switch-darwin-arm64

      - name: Generate checksums
        run: |
          sha256sum *.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dns-switch-*.tar.gz
            checksums.txt
          body: |
            ## DNS Switch ${{ steps.get_version.outputs.VERSION }}

            ### Installation

            Download the appropriate binary for your platform:

            **Linux (amd64):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/dns-switch-linux-amd64.tar.gz
            tar xzf dns-switch-linux-amd64.tar.gz
            sudo mv dns-switch-linux-amd64 /usr/local/bin/dns-switch
            sudo chmod +x /usr/local/bin/dns-switch
            ```

            **Linux (arm64):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/dns-switch-linux-arm64.tar.gz
            tar xzf dns-switch-linux-arm64.tar.gz
            sudo mv dns-switch-linux-arm64 /usr/local/bin/dns-switch
            sudo chmod +x /usr/local/bin/dns-switch
            ```

            **macOS (Intel):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/dns-switch-darwin-amd64.tar.gz
            tar xzf dns-switch-darwin-amd64.tar.gz
            sudo mv dns-switch-darwin-amd64 /usr/local/bin/dns-switch
            sudo chmod +x /usr/local/bin/dns-switch
            ```

            **macOS (Apple Silicon):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/dns-switch-darwin-arm64.tar.gz
            tar xzf dns-switch-darwin-arm64.tar.gz
            sudo mv dns-switch-darwin-arm64 /usr/local/bin/dns-switch
            sudo chmod +x /usr/local/bin/dns-switch
            ```

            ### Verify checksums
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.txt
            sha256sum -c checksums.txt
            ```

            ### What's Changed
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
